---
- name: Test injected Windows Domain Join credential
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Print injected secrets (TEST ONLY)
      ansible.builtin.debug:
        msg:
          - "domain_join_user = {{ lookup('env', 'DOMAIN_JOIN_USER') }}"
          - "domain_join_password = {{ lookup('env', 'DOMAIN_JOIN_PASSWORD') }}"
          - "hetwinadmin_password = {{ lookup('env', 'HETWINADMIN_PASSWORD') }}"